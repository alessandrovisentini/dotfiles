[window]
decorations = "None"

[font]
size = 12.0
normal = { family = "DejaVuSansM Nerd Font Mono", style = "Regular" }
offset.y = 3

[env]
TERM = "xterm-256color"

[colors]

  [colors.primary]
  background = "0x0d1117"
  foreground = "0xe6edf3"

  [colors.cursor]
  text = "0x0d1117"
  cursor = "0xe6edf3"

  [colors.normal]
  black = "0x484f58"
  red = "0xff7b72"
  green = "0x3fb950"
  yellow = "0xd29922"
  blue = "0x58a6ff"
  magenta = "0xbc8cff"
  cyan = "0x39c5cf"
  white = "0xb1bac4"

  [colors.bright]
  black = "0x6e7681"
  red = "0xffa198"
  green = "0x56d364"
  yellow = "0xe3b341"
  blue = "0x79c0ff"
  magenta = "0xd2a8ff"
  cyan = "0x76e3ea"
  white = "0xe6edf3"

  [colors.selection]
  background = "0x30363d"
  text = "CellForeground"

  [colors.search.matches]
  foreground = "0x0d1117"
  background = "0x3fb950"

  [colors.search.focused_match]
  foreground = "0x0d1117"
  background = "0xe3b341"

  [colors.hints.start]
  foreground = "0x0d1117"
  background = "0xd29922"

  [colors.hints.end]
  foreground = "0x0d1117"
  background = "0xe3b341"

  [colors.footer_bar]
  foreground = "0xe6edf3"
  background = "0x161b22"
