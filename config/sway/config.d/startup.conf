# Battery notifier
exec_always $XDG_CONFIG_HOME/sway/scripts/battery_notification.sh

# Prewarm grinch so the 3-finger-up gesture shows it instantly.
exec grinch --daemon

# Push session env to systemd + D-Bus before swaync, so the activated
# notification portal inherits WAYLAND_DISPLAY.
exec dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP SWAYSOCK && swaync

# Tablet-mode daemon
exec systemctl --user start mode-daemon.service

# Touchscreen gestures
exec_always lisgd-sway

# Status bar
exec astal-bar
