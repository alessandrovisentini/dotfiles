# Shared startup. Touch/tablet exec lines (grinch, lisgd-sway,
# mode-daemon) live in `local.conf` on the machines that need them.

# Battery notifier
exec_always $XDG_CONFIG_HOME/sway/scripts/battery_notification.sh

# Push session env to systemd + D-Bus before swaync. PATH is the key one:
# without it, D-Bus/systemd-activated apps inherit a PATH of only
# systemd/bin, and GIO's g_app_info_should_show() then hides every handler
# whose TryExec isn't on PATH (papers, gimp, mpv, ...), collapsing the file
# manager's "Open With" and deja-dup's folder browse to the few apps with
# an absolute Exec (Brave, VLC).
#
# Explicit list, NOT --all: --all would copy whatever happens to be in the
# environment, e.g. TMUX/TMUX_PANE if sway were ever started from a tmux
# pane, poisoning every activated app (t/tmux launcher breaks with "no
# current client").
exec dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP SWAYSOCK DISPLAY PATH XDG_DATA_DIRS && swaync

# NetworkManager secret agent — ferries VPN/Wi-Fi secrets between NM and
# gnome-keyring so connections with `password-flags=1` (agent-owned) work
# without a desktop shell. `--indicator` skips the tray icon on sway.
exec nm-applet --indicator

# Status bar. $bar is set per-device (astal-bar on the X12, waybar on the P14s).
exec $bar
