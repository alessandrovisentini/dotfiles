# Input
input "1739:52840:SYNA8024:00_06CB:CE68_Touchpad" {
    natural_scroll enabled
    accel_profile adaptive
    scroll_factor 0.5
}

input "6127:24830:Darfon_Thinkpad_X12_Detachable_Gen_1_Folio_case_-1" {
    natural_scroll enabled
    accel_profile adaptive
    scroll_factor 0.5
}

input * {
    xkb_options caps:escape,compose:ralt
}

# Pin touch + pen to the panel so coordinates follow the rotation transform.
input "1386:21084:Wacom_HID_525C_Finger" map_to_output eDP-1
input "1386:21084:Wacom_HID_525C_Pen"    map_to_output eDP-1

# Output
output * bg #000000 solid_color

set $laptop_monitor eDP-1
output $laptop_monitor scale 1.2 pos 0 0
bindswitch --locked lid:on output $laptop_monitor disable
bindswitch --locked lid:off output $laptop_monitor enable

# Logical width 1600 = 1920 / 1.2; using 1920 leaves a dead gap.
output 'ASUSTek COMPUTER INC VG27AQA1A R4LMQS155042' mode 2560x1440@119.980Hz pos 1600 0

# Mirror display
for_window [app_id="at.yrlf.wl_mirror"] fullscreen enable
bindsym $mod+Shift+m exec pkill wl-mirror || wl-mirror eDP-1
