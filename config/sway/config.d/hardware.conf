# Shared input + output settings. Per-machine input devices, outputs,
# lid handling, and exec lines live in device.conf (a symlink to one
# of ../devices/*.conf).

input * {
    xkb_options caps:escape,compose:ralt
}

output * bg #000000 solid_color

for_window [app_id="at.yrlf.wl_mirror"] fullscreen enable
