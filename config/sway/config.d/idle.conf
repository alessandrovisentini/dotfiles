# swaylock -f forks only once the lock surface is drawn, so before-sleep blocks
# until the screen is genuinely locked before the machine suspends. after-resume
# re-asserts the lock (a no-op if one is already up) before powering the outputs
# back on, so the panel never lights up on stale, pre-lock content — otherwise
# reopening the lid flashes the desktop for a frame before swaylock repaints.
exec swayidle -w \
    lock 'swaylock -f' \
    before-sleep 'swaylock -f' \
    after-resume 'swaylock -f; swaymsg "output * power on"'
