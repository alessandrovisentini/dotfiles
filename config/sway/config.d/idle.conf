# lock-screen runs gtklock; in tablet mode it loads gtklock-virtkb-module
# so the password can be typed on the touchscreen (the OSK is drawn
# inside the lock window — sway places ext-session-lock above all
# layer-shell clients, so a separate wvkbd surface is hidden underneath).
exec swayidle -w \
    lock 'lock-screen' \
    before-sleep 'lock-screen' \
    after-resume 'swaymsg "output * power on"'
