# swaybar — shared across devices. Sway spawns it from this block (not via an
# `exec`), so it just needs to exist. Theme vars ($bg etc.) are defined in the
# main config, which is read before this.
bar {
    position bottom
    font pango:JetBrainsMono Nerd Font 11

    # Network / volume / brightness / battery / clock, refreshed every second.
    status_command exec "$HOME/.config/sway/scripts/swaybar-status.sh"

    # The tray is on by default; this disables it entirely.
    tray {
        tray_output none
    }

    colors {
        background $bg
        statusline $fg
        separator  $muted
        #                    border     background  text
        focused_workspace    $focus     $headerbar  $fg
        active_workspace     $surface   $surface    $fg
        inactive_workspace   $surface   $surface    $muted
        urgent_workspace     $danger    $danger     $fg
        binding_mode         $accent    $accent     $fg
    }
}
