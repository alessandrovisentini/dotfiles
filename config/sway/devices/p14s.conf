# ThinkPad P14s Gen 4

# Built-in touchpad
input "1739:52840:SYNA8024:00_06CB:CE68_Touchpad" {
    natural_scroll enabled
    accel_profile adaptive
    scroll_factor 0.5
}

# Internal monitor
output eDP-1 pos 0 0

# eGPU-only boot disables the Intel driver, so the internal panel can't be driven
# and shows up as the generic simpledrm output "Unknown-1" (eDP-1 is absent there).
# Turn it off so the panel stays dark and only the eGPU outputs are used.
output "Unknown-1" disable

# External monitor
output 'ASUSTek COMPUTER INC VG27AQA1A R4LMQS155042' mode 2560x1440@119.980Hz pos 1920 0

# Mirror the internal panel to an external output
bindsym $mod+Shift+m exec pkill wl-mirror || wl-mirror eDP-1

# Lid handling
bindswitch --locked lid:on exec $XDG_CONFIG_HOME/sway/scripts/lid_edp.sh
bindswitch --locked lid:off output eDP-1 enable
