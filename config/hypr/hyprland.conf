# Modular config; concerns split under conf.d/. The gesture plugin is
# loaded at runtime (load-hyprgrass), not here — config-parse loading
# crashes Hyprland 0.52.1.

source = ~/.config/hypr/conf.d/env.conf
source = ~/.config/hypr/conf.d/monitors.conf
source = ~/.config/hypr/conf.d/input.conf
source = ~/.config/hypr/conf.d/look.conf
source = ~/.config/hypr/conf.d/window-rules.conf
source = ~/.config/hypr/conf.d/keybinds.conf
source = ~/.config/hypr/conf.d/autostart.conf
