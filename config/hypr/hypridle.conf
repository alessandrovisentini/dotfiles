# Only the lock-before-sleep flow is used; no idle-timeout lock, so the
# screen never auto-locks during active use.

general {
    # Fires on logind's Lock signal. lock-screen wraps hyprlock and
    # raises the OSK in tablet mode; it self-guards against double-lock.
    lock_cmd = lock-screen

    # Lock before suspend; logind waits for this, so the lock is up
    # before sleep starts.
    before_sleep_cmd = loginctl lock-session

    # Re-enable the display on wake (sometimes left dpms-off after resume).
    after_sleep_cmd = hyprctl dispatch dpms on
}
