# hyprlock — authenticates via PAM (account password only; fingerprint
# is disabled here, it stalls unlock on the fprintd timeout). wvkbd is
# raised over the lock for touchscreen entry; see window-rules.conf and
# Hyprland issue #6195.

general {
    hide_cursor = true
    immediate_render = true
}

background {
    monitor =
    color = rgba(000000ff)
}

# Clock
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(ffffffff)
    font_size = 90
    font_family = JetBrains Mono Bold
    position = 0, 240
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A %-d %B')"
    color = rgba(e6e6e6ff)
    font_size = 22
    font_family = JetBrains Mono
    position = 0, 150
    halign = center
    valign = center
}

# Password field — circular indicator that lights up as you type.
# size is square + rounding = -1 → a full circle. No placeholder/fail
# text (wouldn't fit a circle); fail is shown by the ring turning red.
input-field {
    monitor =
    size = 110, 110
    outline_thickness = 3
    dots_size = 0.15
    dots_spacing = 0.30
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(3584e4cc)
    inner_color = rgba(00000088)
    font_color = rgba(ffffffff)
    fade_on_empty = false
    placeholder_text =
    hide_input = true
    rounding = -1
    check_color = rgba(33ccffff)
    fail_color = rgba(ff4d4dff)
    fail_text =
    capslock_color = -1
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false

    position = 0, -80
    halign = center
    valign = center
}
