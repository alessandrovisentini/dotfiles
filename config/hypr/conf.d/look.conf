general {
    gaps_in = 2
    gaps_out = 4
    border_size = 1
    col.active_border = rgba(3584e4ff) rgba(62a0eaff) 45deg
    col.inactive_border = rgba(33333366)
    layout = dwindle
    resize_on_border = true
    allow_tearing = false
}

decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 0.97
    fullscreen_opacity = 1.0
    dim_inactive = false

    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
        ignore_opacity = true
    }

    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(00000055)
    }
}

animations {
    enabled = true
    bezier = ease, 0.2, 0.7, 0.2, 1.0

    # Disable all animations, then re-enable only layers (grinch slide).
    animation = global, 0
    animation = layers, 1, 6, ease, slide
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    vfr = true
    vrr = 1
    enable_swallow = false
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

cursor {
    inactive_timeout = 5
    hide_on_key_press = false
}

# Bilinear XWayland downscaling for smoother fractional scaling.
xwayland {
    use_nearest_neighbor = false
}
