# Float popups
windowrulev2 = float, class:^(pavucontrol|pwvucontrol|blueman-manager|nm-connection-editor)$
windowrulev2 = float, class:^(gnome-calculator|org.gnome.Calculator)$
windowrulev2 = float, title:^(Open File|Save File|Save As|File Operation Progress)$

# Rofi: centered, no decorations
windowrulev2 = float,            class:^(Rofi|rofi)$
windowrulev2 = stayfocused,      class:^(Rofi|rofi)$
windowrulev2 = noborder,         class:^(Rofi|rofi)$

# HyprPanel (Astal) windows
windowrulev2 = noborder,         class:^(com\.github\.Aylur\.ags)$
windowrulev2 = noshadow,         class:^(com\.github\.Aylur\.ags)$
windowrulev2 = noblur,           class:^(com\.github\.Aylur\.ags)$

# grinch: slide up on show. Duration/bezier from look.conf's layers anim.
layerrule = animation slide, ^(grinch)$

# Suppress the slide on other layers. Listed explicitly because
# Hyprland 0.52.1's layer-regex doesn't honour negative lookahead.
layerrule = noanim, ^(rofi)$
layerrule = noanim, ^(hyprpicker)$
layerrule = noanim, ^(bar-0)$
layerrule = noanim, ^(notifications-window)$
layerrule = noanim, ^(indicator)$
layerrule = noanim, ^(.*menu)$
layerrule = noanim, ^(osk)$
layerrule = noanim, ^(wvkbd)$
layerrule = noanim, ^(swaync.*)$

# abovelock lets wvkbd render over the hyprlock session-lock surface so
# the password is typable on the touchscreen. lock-screen maps it before
# locking; a surface mapped during the lock is suppressed.
# See https://github.com/hyprwm/Hyprland/issues/6195.
layerrule = abovelock 1, ^(wvkbd)$

