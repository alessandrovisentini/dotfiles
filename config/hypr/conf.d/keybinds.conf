$mod = SUPER
$term = alacritty
$menu = rofi -show drun
$browser = firefox
$files = nautilus

# Launchers, terminal, exits
bind = $mod, RETURN,       exec, $term
bind = $mod, D,            exec, grid-toggle
bind = $mod, M,            exec, $menu
bind = $mod SHIFT, Q,      killactive
bind = $mod SHIFT, E,      exit
bind = $mod CTRL, Q,       exec, lock-screen
bind = $mod, E,            exec, $files
bind = $mod, B,            exec, $browser
bind = $mod SHIFT, R,      exec, hyprctl reload

# Floating / fullscreen
bind = $mod, F,            fullscreen
bind = $mod SHIFT, space,  togglefloating
bind = $mod, J,            togglesplit

# OSK manual toggle (XWayland fallback)
bind = $mod, K,            exec, osk-toggle

# Tablet-mode launchers / panel
bind = $mod SHIFT, D,      exec, $menu
bind = $mod, N,            exec, hyprpanel-toggle dashboardmenu
bind = $mod SHIFT, N,      exec, hyprpanel-toggle notificationsmenu

# Focus (hjkl + arrows)
bind = $mod, h,            movefocus, l
bind = $mod, j,            movefocus, d
bind = $mod, k,            movefocus, u
bind = $mod, l,            movefocus, r
bind = $mod, left,         movefocus, l
bind = $mod, down,         movefocus, d
bind = $mod, up,           movefocus, u
bind = $mod, right,        movefocus, r

# Move (hjkl + arrows)
bind = $mod SHIFT, h,      movewindow, l
bind = $mod SHIFT, j,      movewindow, d
bind = $mod SHIFT, k,      movewindow, u
bind = $mod SHIFT, l,      movewindow, r
bind = $mod SHIFT, left,   movewindow, l
bind = $mod SHIFT, down,   movewindow, d
bind = $mod SHIFT, up,     movewindow, u
bind = $mod SHIFT, right,  movewindow, r

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# Touch / mouse window manipulation
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Resize submap (Mod+R enters, Esc/Enter exits)
bind = $mod, R, submap, resize
submap = resize
binde = , h,     resizeactive, -10 0
binde = , j,     resizeactive,  0 10
binde = , k,     resizeactive,  0 -10
binde = , l,     resizeactive,  10 0
binde = , left,  resizeactive, -10 0
binde = , down,  resizeactive,  0 10
binde = , up,    resizeactive,  0 -10
binde = , right, resizeactive,  10 0
bind = , RETURN, submap, reset
bind = , ESCAPE, submap, reset
submap = reset

# Media keys
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

bindl = , XF86AudioPlay,    exec, playerctl play-pause
bindl = , XF86AudioPause,   exec, playerctl pause
bindl = , XF86AudioStop,    exec, playerctl stop
bindl = , XF86AudioPrev,    exec, playerctl previous
bindl = , XF86AudioNext,    exec, playerctl next
bindl = , XF86AudioForward, exec, playerctl position 10+
bindl = , XF86AudioRewind,  exec, playerctl position 10-

# Screenshots (grim)
bind = ,            Print,   exec, grim - | wl-copy
bind = ALT,         Print,   exec, grim -g "$(hyprctl activewindow -j | jq -r '"\(.at[0]),\(.at[1]) \(.size[0])x\(.size[1])"')" - | wl-copy
bind = ALT SHIFT,   4,       exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT,       Print,   exec, grim -g "$(slurp)" - | swappy -f -

# Color picker
bind = $mod SHIFT, C, exec, hyprpicker -a

# Special workspace (scratchpad)
bind = $mod, S,         togglespecialworkspace, scratch
bind = $mod SHIFT, S,   movetoworkspace, special:scratch

