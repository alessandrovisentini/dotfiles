# Polkit auth agent (NixOS path)
exec-once = /run/current-system/sw/libexec/polkit-gnome-authentication-agent-1

# Cursor
exec-once = hyprctl setcursor Bibata-Modern-Classic 24

# Mode detection; also manages iio-hyprland, so don't start that here.
exec-once = systemctl --user start mode-daemon.service

# Touchscreen gesture plugin (loaded live; see hyprland.conf).
exec-once = load-hyprgrass

# Re-source hyprgrass binds after each config reload (they're wiped).
exec-once = hyprgrass-watch

# grinch daemon: starts hidden, shown via SIGUSR1 (grid-toggle).
# Prewarms GTK so showing is instant rather than a cold start.
exec-once = grinch --daemon

# App OSK; auto-popup gated by the a11y gsetting apply-mode toggles.
exec-once = squeekboard

# Bar / control center / notifications
exec-once = hyprpanel

# Idle/sleep handler; locks before suspend.
exec-once = hypridle

# Clipboard history
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
