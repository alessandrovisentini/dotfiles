input {
    kb_layout = us,it
    kb_variant =
    kb_options = grp:win_space_toggle,caps:escape

    follow_mouse = 1
    sensitivity = 0

    # Resolve binds by symbol, not keycode, so a virtual keyboard's
    # keysyms still match regardless of its keymap.
    resolve_binds_by_sym = 1

    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
        clickfinger_behavior = true
        scroll_factor = 0.4
    }

    # Pin touchscreen + pen to the panel so rotation transforms track it.
    touchdevice {
        output = eDP-1
        transform = 0
    }
    tablet {
        output = eDP-1
        transform = 0
        relative_input = false
    }
}

# Default state; the mode-daemon flips this to false when the folio detaches.
device {
    name = darfon-thinkpad-x12-detachable-gen-1-folio-case-1-touchpad
    enabled = true
}
