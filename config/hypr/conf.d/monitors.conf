monitor = eDP-1, preferred, 0x0, 1.25
monitor = , preferred, auto, 1

# Disable the internal panel on lid-close so its workspaces migrate to the
# external monitor; restore on open.
bindl = , switch:on:Lid Switch,  exec, hyprctl keyword monitor "eDP-1, disable"
bindl = , switch:off:Lid Switch, exec, hyprctl keyword monitor "eDP-1, preferred, auto, 1.25"
