[org/gnome/desktop/interface]
accent-color='blue'
enable-animations=false
enable-hot-corners=false
color-scheme='prefer-dark'
gtk-theme='Adwaita-dark'

[org/gnome/desktop/background]
picture-uri=''
picture-uri-dark=''
picture-options='none'
primary-color='#000000'
color-shading-type='solid'

[org/gnome/desktop/input-sources]
xkb-options=['caps:escape_shifted_capslock', 'compose:ralt']

[org/gnome/shell]
enabled-extensions=['appindicatorsupport@rgcjonas.gmail.com', 'simple-workspaces-bar@null-git', 'disable-workspace-switcher-overlay@cleardevice', 'move-without-follow@local']

[org/gnome/shell/window-switcher]
current-workspace-only=true

[org/gnome/shell/app-switcher]
current-workspace-only=true

[org/gnome/desktop/peripherals/touchpad]
tap-to-click=false

[org/gnome/mutter]
dynamic-workspaces=false
overlay-key=''
# scale-monitor-framebuffer: enable fractional scaling.
# xwayland-native-scaling: render XWayland apps at integer scale and downsample,
# so apps that stay on XWayland (legacy or non-Wayland Electron) stay sharp.
experimental-features=['scale-monitor-framebuffer', 'xwayland-native-scaling']

[org/gnome/desktop/wm/preferences]
num-workspaces=9

[org/gnome/shell/keybindings]
switch-to-application-1=@as []
switch-to-application-2=@as []
switch-to-application-3=@as []
switch-to-application-4=@as []
switch-to-application-5=@as []
switch-to-application-6=@as []
switch-to-application-7=@as []
switch-to-application-8=@as []
switch-to-application-9=@as []
toggle-overview=['<Super>d']

[org/gnome/desktop/wm/keybindings]
switch-to-workspace-1=['<Super>1']
switch-to-workspace-2=['<Super>2']
switch-to-workspace-3=['<Super>3']
switch-to-workspace-4=['<Super>4']
switch-to-workspace-5=['<Super>5']
switch-to-workspace-6=['<Super>6']
switch-to-workspace-7=['<Super>7']
switch-to-workspace-8=['<Super>8']
switch-to-workspace-9=['<Super>9']
# Super+Shift+{1..9} is handled by the move-without-follow extension
# (sends window to workspace N without switching to it).
move-to-workspace-1=@as []
move-to-workspace-2=@as []
move-to-workspace-3=@as []
move-to-workspace-4=@as []
move-to-workspace-5=@as []
move-to-workspace-6=@as []
move-to-workspace-7=@as []
move-to-workspace-8=@as []
move-to-workspace-9=@as []
close=['<Super><Shift>q']
maximize=['<Super>f']
minimize=@as []
switch-windows=['<Super>Tab']
switch-windows-backward=['<Super><Shift>Tab']
switch-applications=@as []
switch-applications-backward=@as []

[org/gnome/settings-daemon/plugins/media-keys]
screensaver=['<Super><Control>q']
custom-keybindings=['/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom0/']

[org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom0]
binding='<Super>Return'
command='alacritty --option window.startup_mode=\'"Maximized"\''
name='Launch Alacritty Fullscreen'

[org/gnome/settings-daemon/plugins/power]
sleep-inactive-ac-type='nothing'
sleep-inactive-battery-type='nothing'
