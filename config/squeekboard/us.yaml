buttons:
    Shift_L:
        action:
            locking:
                lock_view: "upper"
                unlock_view: "base"
        outline: "altline"
        label: "⇧"
    BackSpace:
        outline: "altline"
        icon: "edit-clear-symbolic"
        action: erase
    # World key: switches to the first page of the flat emoji layout
    # (emoji_p01 .. emoji_p76). Each page has a category strip on top
    # (😀 🧑 🐶 🍕 ✈ ⚽ 💡 ♥ 🏁), 9x3 emojis, and a slim nav row at
    # the bottom: ⇤ABC | ‹ | › | ⌫. emoji_default's 65-unit height is
    # tuned so 1 cat row (30) + 3 emoji rows (3×65) + 1 nav row (35) =
    # 260, matching QWERTY's 5×52 — keeps both views at the same scale.
    world:
        action: { set_view: "emoji_p01" }
        outline: "altline"
        label: "🌐"
    show_numbers:
        action: { set_view: "numbers" }
        outline: "wide"
        label: "123"
    show_letters:
        action: { set_view: "base" }
        outline: "wide"
        label: "ABC"
    show_numbers_from_symbols:
        action: { set_view: "numbers" }
        outline: "wide"
        label: "123"
    show_symbols:
        action: { set_view: "symbols" }
        outline: "wide"
        label: "*/="
    show_actions:
        action: { set_view: "actions" }
        outline: "wide"
        label: ">_"

    colon:     { text: ":" }
    semicolon: { text: ";" }
    period:    { text: "." }
    exclam:    { text: "!" }
    question:  { text: "?" }
    space:
        outline: "spaceline"
        text: " "
    Return:
        outline: "wide"
        keysym: "Return"
        label: "↵"

    # Modifiers — sticky for the next non-modifier key.
    Ctrl:  { modifier: "Control", label: "Ctrl" }
    Alt:   { modifier: "Alt",     label: "Alt" }
    Super: { modifier: "Mod4",    label: "Super" }

    # Editing / navigation.
    Esc:    { keysym: "Escape", label: "Esc" }
    Tab:    { keysym: "Tab",    label: "Tab" }
    Home:   { keysym: "Home",      label: "Home" }
    End:    { keysym: "End",       label: "End" }
    Insert: { keysym: "Insert",    label: "Ins" }
    Delete: { keysym: "Delete",    label: "Del" }
    PgUp:   { keysym: "Page_Up",   label: "PgUp" }
    PgDn:   { keysym: "Page_Down", label: "PgDn" }
    "←":    { keysym: "Left",  label: "←" }
    "→":    { keysym: "Right", label: "→" }
    "↑":    { keysym: "Up",    label: "↑" }
    "↓":    { keysym: "Down",  label: "↓" }

    # Function row.
    F1:  { outline: "action", keysym: "F1",  label: "F1" }
    F2:  { outline: "action", keysym: "F2",  label: "F2" }
    F3:  { outline: "action", keysym: "F3",  label: "F3" }
