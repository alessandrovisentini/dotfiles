---
# Override of squeekboard's bundled us.yaml. Modeled on the bundled
# terminal/us.yaml: a constant top row exposes Esc/Tab + modifiers
# (Ctrl/Alt/Super) + arrows on every view. F1–F12 + navigation live
# in the "actions" view, reached via the ">_" button on the bottom row.

outlines:
    default:   { width: 35.33,  height: 52 }
    altline:   { width: 52,     height: 52 }
    wide:      { width: 59.33,  height: 52 }
    spaceline: { width: 207.66, height: 52 }
    action:    { width: 59,     height: 46 }
    emoji_default:
      width: 52.553333333333335
      height: 65
    emoji_nav:
      width: 118.245
      height: 35
    emoji_cat:
      width: 52.553333333333335
      height: 30

views:
    base:
        - "Esc Tab Ctrl Alt Super ← ↑ ↓ →"
        - "q w e r t y u i o p"
        - "a s d f g h j k l"
        - "Shift_L   z x c v b n m   BackSpace"
        - "show_numbers show_actions world space period Return"
    upper:
        - "Esc Tab Ctrl Alt Super ← ↑ ↓ →"
        - "Q W E R T Y U I O P"
        - "A S D F G H J K L"
        - "Shift_L   Z X C V B N M   BackSpace"
        - "show_numbers show_actions world space period Return"
    numbers:
        - "Esc Tab Ctrl Alt Super Home End PgUp PgDn"
        - "1 2 3 4 5 6 7 8 9 0"
        - "@ # $ % & - _ + ( )"
        - "show_symbols   , \" ' colon semicolon exclam question   BackSpace"
        - "show_letters show_actions world space period Return"
    symbols:
        - "Esc Tab Ctrl Alt Super Home End PgUp PgDn"
        - "~ ` | · √ π τ ÷ × ¶"
        - "© ® £ € ¥ ^ ° * { }"
        - "show_numbers_from_symbols   \\ / < > = [ ]   BackSpace"
        - "show_letters show_actions world space period Return"
    actions:
        - "Esc Tab Ctrl Alt Super Insert Delete PgUp PgDn"
        - "F1 F2 F3 F4 F5 F6 F7 F8 F9 F10"
        - "F11 F12 ← ↑ ↓ → Home End BackSpace"
        - "show_letters world space Return"
